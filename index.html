<!DOCTYPE html>
<html>
<head>
  <title>Global Fart Network 🏆💨</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    /* HEADER */
    .header {
      background: #c1121f;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px;
      font-weight: bold;
    }

    .logo {
      font-size: 24px;
    }

    .live {
      background: black;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px;
    }

    /* TICKER */
    .ticker {
      background: black;
      color: #ffd166;
      padding: 10px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
    }

    /* HERO */
    .hero {
      max-width: 800px;
      margin: 30px auto;
      background: linear-gradient(135deg, #c1121f, #ef233c);
      border-radius: 25px;
      padding: 35px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .hero-label {
      letter-spacing: 3px;
      font-size: 14px;
    }

    #count {
      font-size: 72px;
      font-weight: 900;
      margin: 15px 0;
      transition: transform 0.15s ease;
    }

    .btn {
      font-size: 34px;
      padding: 18px 50px;
      border: none;
      border-radius: 18px;
      background: black;
      color: white;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .btn:active {
      transform: scale(0.92);
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* PODIUM */
    .podium {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 25px auto;
      flex-wrap: wrap;
    }

    .podium-card {
      background: #1e293b;
      padding: 18px;
      border-radius: 14px;
      min-width: 140px;
      border: 1px solid #334155;
    }

    .gold { background: #facc15; color: black; }
    .silver { background: #cbd5e1; color: black; }
    .bronze { background: #d97706; color: black; }

    /* GRID */
    .grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      width: 300px;
      border: 1px solid #334155;
    }

    #feed {
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
    }

    .card {
      padding: 8px;
      margin: 6px 0;
      background: #334155;
      border-radius: 8px;
    }

    .trend {
      background: #dc2626;
      padding: 8px;
      border-radius: 8px;
      margin: 6px 0;
      font-weight: bold;
    }

    #map {
      font-size: 16px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🏆 GLOBAL FART NETWORK</div>
  <div class="live">🔴 LIVE</div>
</div>

<!-- TICKER -->
<div class="ticker">
  <div id="tickerText">🚨 Global Fart Championship Begins</div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-label">GLOBAL TOTAL</div>
  <div id="count">Loading...</div>

  <button class="btn" onclick="fart()">💨 FART NOW</button>
</div>

<!-- PODIUM -->
<div class="podium">

  <div class="podium-card silver">
    🥈
    <div id="secondPlace">Loading...</div>
  </div>

  <div class="podium-card gold">
    🥇
    <div id="firstPlace">Loading...</div>
  </div>

  <div class="podium-card bronze">
    🥉
    <div id="thirdPlace">Loading...</div>
  </div>

</div>

<!-- GRID -->
<div class="grid">

  <div class="box">
    <h3>📡 Live Feed</h3>
    <div id="feed"></div>
  </div>

  <div class="box">
    <h3>🌍 Map (Top Countries)</h3>
    <div id="map"></div>
  </div>

  <div class="box">
    <h3>📈 Trending</h3>
    <div id="trending"></div>
  </div>

</div>

<!-- SOUND -->
<audio id="sound" preload="auto">
  <source src="https://www.myinstants.com/media/sounds/fart.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue, push }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_W2kYalnK_BIZc3hYj2E4yXBf68C-Ke0",
  authDomain: "fart-counter-f86e8.firebaseapp.com",
  databaseURL: "https://fart-counter-f86e8-default-rtdb.firebaseio.com",
  projectId: "fart-counter-f86e8",
  storageBucket: "fart-counter-f86e8.firebasestorage.app",
  messagingSenderId: "194705501601",
  appId: "1:194705501601:web:96e1ceacc0c44015c62fe0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const counterRef = ref(db, "fartCount");
const feedRef = ref(db, "feed");
const countryRef = ref(db, "countries");

/* AUDIO UNLOCK */
document.addEventListener("click", () => {
  const s = document.getElementById("sound");
  s.play().then(()=>{ s.pause(); s.currentTime=0; }).catch(()=>{});
}, { once: true });

/* GLOBAL COUNTER */
onValue(counterRef, (snap) => {
  const el = document.getElementById("count");
  el.innerText = Number(snap.val()).toLocaleString();
  el.style.transform = "scale(1.2)";
  setTimeout(()=>el.style.transform="scale(1)",100);
});

/* GET COUNTRY */
async function getCountry() {
  try {
    const r = await fetch("https://ipapi.co/json/");
    const d = await r.json();
    return d.country_name || "Unknown";
  } catch {
    return "Unknown";
  }
}

/* FART ACTION */
window.fart = async function () {

  const country = await getCountry();

  runTransaction(counterRef, (c) => (c || 9000000000) + 1);

  const sound = document.getElementById("sound");
  sound.currentTime = 0;
  sound.play().catch(()=>{});

  push(feedRef, {
    text: `💨 ${country} just contributed`,
    time: Date.now()
  });

  runTransaction(countryRef, (data) => {
    data = data || {};
    data[country] = (data[country] || 0) + 1;
    return data;
  });
};

/* FEED */
onValue(feedRef, (snap) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";
  const data = snap.val();
  if (!data) return;

  Object.values(data).reverse().forEach(x => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = x.text;
    feed.appendChild(div);
  });
});

/* MAP */
onValue(countryRef, (snap) => {
  const map = document.getElementById("map");
  map.innerHTML = "";

  const data = snap.val();
  if (!data) return;

  const sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]);

  sorted.slice(0,5).forEach(([c,v])=>{
    const div = document.createElement("div");
    div.innerText = `${c}: ${v}`;
    map.appendChild(div);
  });

  /* PODIUM */
  if(sorted[0]){
    firstPlace.innerText = `${sorted[0][0]}\n${sorted[0][1]}`;
  }
  if(sorted[1]){
    secondPlace.innerText = `${sorted[1][0]}\n${sorted[1][1]}`;
  }
  if(sorted[2]){
    thirdPlace.innerText = `${sorted[2][0]}\n${sorted[2][1]}`;
  }
});

/* TRENDING */
onValue(countryRef, (snap) => {
  const t = document.getElementById("trending");
  t.innerHTML = "";

  const data = snap.val();
  if (!data) return;

  Object.entries(data)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3)
    .forEach(([c])=>{
      const div = document.createElement("div");
      div.className = "trend";
      div.innerText = `🔥 ${c}`;
      t.appendChild(div);
    });
});

/* TICKER */
setInterval(() => {
  const msgs = [
    "🚨 California surging in rankings",
    "🔥 Texas closing the gap",
    "🏆 Global competition intensifies",
    "💨 New farts detected worldwide",
    "📈 Leaderboard shifting live"
  ];

  document.getElementById("tickerText")
    .innerText =
    msgs[Math.floor(Math.random()*msgs.length)];

}, 3500);

</script>

</body>
</html>
