<!DOCTYPE html>
<html>
<head>
  <title>Global Fart Network 🌍💨</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 60px;
      background: linear-gradient(to bottom, #f5f5f5, #ffffff);
    }

    h1 {
      font-size: 46px;
    }

    #count {
      font-size: 60px;
      margin: 20px;
      transition: transform 0.15s ease;
    }

    .btn {
      font-size: 30px;
      padding: 18px 45px;
      border: none;
      border-radius: 18px;
      background: black;
      color: white;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .btn:active {
      transform: scale(0.9);
    }

    .grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    #feed {
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
    }

    .card {
      padding: 8px;
      margin: 6px 0;
      background: #f2f2f2;
      border-radius: 8px;
    }

    #map {
      font-size: 18px;
      line-height: 1.6;
    }

    .trend {
      font-weight: bold;
      margin: 6px 0;
    }
  </style>
</head>

<body>

<h1>🌍 Global Fart Network</h1>

<div id="count">Loading...</div>

<button class="btn" onclick="fart()">💨 FART</button>

<div class="grid">

  <div class="box">
    <h3>📡 Live Feed</h3>
    <div id="feed"></div>
  </div>

  <div class="box">
    <h3>🌍 Map (Top Countries)</h3>
    <div id="map"></div>
  </div>

  <div class="box">
    <h3>📈 Trending</h3>
    <div id="trending"></div>
  </div>

</div>

<audio id="sound" preload="auto">
  <source src="https://www.myinstants.com/media/sounds/fart.mp3" type="audio/mpeg">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue, push }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_W2kYalnK_BIZc3hYj2E4yXBf68C-Ke0",
  authDomain: "fart-counter-f86e8.firebaseapp.com",
  databaseURL: "https://fart-counter-f86e8-default-rtdb.firebaseio.com",
  projectId: "fart-counter-f86e8",
  storageBucket: "fart-counter-f86e8.firebasestorage.app",
  messagingSenderId: "194705501601",
  appId: "1:194705501601:web:96e1ceacc0c44015c62fe0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const counterRef = ref(db, "fartCount");
const feedRef = ref(db, "feed");
const countryRef = ref(db, "countries");

// unlock audio
document.addEventListener("click", () => {
  const s = document.getElementById("sound");
  s.play().then(()=>{ s.pause(); s.currentTime=0; }).catch(()=>{});
}, { once: true });

// 🌍 COUNTER
onValue(counterRef, (snap) => {
  const el = document.getElementById("count");
  el.innerText = Number(snap.val()).toLocaleString();
  el.style.transform = "scale(1.2)";
  setTimeout(()=>el.style.transform="scale(1)",100);
});

// 🌍 SIMPLE COUNTRY (fallback)
async function getCountry() {
  try {
    const r = await fetch("https://ipapi.co/json/");
    const d = await r.json();
    return d.country_name || "Unknown";
  } catch {
    return "Unknown";
  }
}

// 💨 FART
window.fart = async function () {

  const country = await getCountry();

  runTransaction(counterRef, (c) => (c || 9000000000) + 1);

  const sound = document.getElementById("sound");
  sound.currentTime = 0;
  sound.play().catch(()=>{});

  push(feedRef, {
    text: `💨 ${country} just contributed`,
    time: Date.now()
  });

  // simple trending counter per country
  runTransaction(countryRef, (data) => {
    data = data || {};
    data[country] = (data[country] || 0) + 1;
    return data;
  });
};

// 📡 FEED
onValue(feedRef, (snap) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";
  const data = snap.val();
  if (!data) return;

  Object.values(data).reverse().forEach(x => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = x.text;
    feed.appendChild(div);
  });
});

// 🌍 MAP (COUNTRIES)
onValue(countryRef, (snap) => {
  const map = document.getElementById("map");
  map.innerHTML = "";

  const data = snap.val();
  if (!data) return;

  Object.entries(data)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5)
    .forEach(([country,count])=>{
      const div = document.createElement("div");
      div.innerText = `${country}: ${count}`;
      map.appendChild(div);
    });
});

// 📈 TRENDING (same data simplified)
onValue(countryRef, (snap) => {
  const t = document.getElementById("trending");
  t.innerHTML = "";

  const data = snap.val();
  if (!data) return;

  Object.entries(data)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3)
    .forEach(([c,v])=>{
      const div = document.createElement("div");
      div.className = "trend";
      div.innerText = `🔥 ${c}`;
      t.appendChild(div);
    });
});
</script>

</body>
</html>
